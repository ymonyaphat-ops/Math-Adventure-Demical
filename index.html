<html>
<head>
  <title>Math Adventure</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
.screen{
  width:100vw;
  height:100vh;
  max-width:none;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;
  color:white;
  padding:20px;

  background-size: cover;
  background-position: center;
}
.centerBox{
  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);

  max-width:420px;
  width:100%;
}
#uiBox{
  position: relative;

  width:100%;
  max-width:1200px;

  margin:auto;

  padding-top:0px;

  background:none;
  box-shadow:none;

  color:white;
}
.centerBox{
  width:100%;
  max-width:420px;

  margin:auto;

  background: rgba(0,0,0,0.7);
  padding:20px;
  border-radius:20px;

  text-align:center;
  color:white;

  box-shadow: 0 0 20px rgba(0,0,0,0.8);
}
#welcomeBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background: rgba(0,0,0,0.7);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:999;

  display:none; /* ⭐ ซ่อนไว้ก่อน */
}

#welcomeBox div{
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  text-align:center;
  font-size:22px;
}

#welcomeBox button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.screen button{
  padding:10px 20px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  cursor:pointer;
}
.screen button:hover{
  transform:scale(1.1);
  background:#ff9f43;
}
body {
  margin:0;
  font-family: 'Segoe UI';
  background: black;
}
/* ===== Layout ใหม่ ===== */

#battleArea{
  display:flex;
  justify-content:center;
  align-items:center;

  gap:40px;

  width:100%;
  margin:20px auto;
}

#playerArea,
#enemyArea{

  width:220px;

  flex-shrink:0;

  text-align:center;
}

#centerArea{

  width:600px;

  flex-shrink:0;

  text-align:center;
}

#questionBox{

  width:500px;

  min-height:90px;

  background:rgba(255,255,255,0.15);

  padding:15px;

  border-radius:15px;

  display:flex;
  justify-content:center;
  align-items:center;
}

#battleBox{
  width:100%;
  margin:15px 0;
}

#questionBox{
  text-align:center;
  margin:15px 0;
}

#resultBox{
  text-align:center;
  margin-top:-20px;
}

#player,
#enemy{

  width:160px;

  height:160px;

  object-fit:contain;

  transition:0.2s;
}

#enemy {
  transition:0.2s;

  filter:
  drop-shadow(0 0 10px red)
  drop-shadow(0 0 20px red);
}

.characterSide{
  width:25%;
  text-align:center;
}

.centerSide{
  width:50%;
  text-align:center;
}

/* 📦 กล่องเกม */
#gameBox {
  width:100vw;
  height:100vh;

  overflow:hidden;

  background: url('bg.jpg') no-repeat center;
  background-size: cover;

  display:flex;
  justify-content:center;

  align-items:flex-start; /* ⭐ แก้ตรงนี้ */

  padding:20px;
  box-sizing:border-box;

  position: relative;
}

#gameBox::before{
  display:none;
}
/* 🎯 หัวเกม */
#title {

  text-align:center;

  font-size:40px;

  font-weight:bold;

  margin-bottom:15px;
}

/* 💰 แถบบน */
#topUI {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* ❤️ HP */
#hpBar {
  display:none;
}

#hpFill {
  height:100%;
  background:limegreen;
  width:100%;
  border-radius:10px;
}

/* ❤️ เลือดศัตรู */
#enemyHPBar {
  height:10px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
  width:80px;
}
#enemyHPFill {
  height:100%;
  background:red;
  width:100%;
  border-radius:10px;
}

/* ❓ คำถาม */
#question {

  font-size:40px;

  white-space:nowrap;

  font-weight:bold;

  margin:0;
}

/* 🔘 ปุ่ม */
button.choice {

  width:100%;

  height:70px;

  margin:5px;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(0,0,0,0.35);

  border:2px solid rgba(255,255,255,0.3);

  border-radius:15px;

  color:white;

  font-size:24px;

  cursor:pointer;

  transition:0.2s;
}

#choices{

  width:500px;

  margin:10px auto 0 auto;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:15px;
}

button.choice:hover {
  transform:scale(1.05);
  background:#4834d4;
}

/* 📊 ผลลัพธ์ */
#result {
  margin-top:10px;
  font-weight:bold;
}

/* ➡️ ปุ่มด่าน */
#nextBtn {
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
  background:orange;
  color:white;
  cursor:pointer;
}
#enemyBox {
  display:flex;
  flex-direction:column;
  align-items:center;   /* ⭐ ทำให้ทุกอย่างอยู่กลาง */
}
#characterScreen img{
  width:130px;
  height:130px;
  object-fit:contain;
  background: rgba(255,255,255,0.6); /* ⭐ ขาวโปร่ง */
  padding:10px;

  cursor:pointer;
  margin:10px;
  border-radius:15px;
  transition:0.2s;
}
#playerName{
  width:80%;
  max-width:300px;

  padding:12px;
  font-size:18px;

  border-radius:10px;
  border:none;

  outline:none;
  text-align:center;

  background: rgba(255,255,255,0.9);
}
#playerName:focus{
  box-shadow:0 0 10px #74b9ff;
}

#characterScreen img:hover{
  transform:scale(1.1);
}

#characterScreen img.selected{
  transform:scale(1.2);   /* ⭐ เพิ่มความเด่น */
  border:3px solid yellow;
  box-shadow:0 0 20px yellow;
}

@keyframes pulse{
  from{ transform:scale(1.3); }
  to{ transform:scale(1.5); }
}
/* 🌲 หน้าเริ่ม */
#startScreen{
  background: url('bg1.jpg') no-repeat center;
  background-size: cover;
}

/* 🧙‍♂️ หน้าเลือกตัวละคร */
#characterScreen{
  background: url('bg2.jpg') no-repeat center;
  background-size: cover;

  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 🗺️ หน้าแผนที่ */
#mapScreen{
  background: url('map.jpg') no-repeat center center;
  background-size: cover;
  position: relative;
}

#mapArea{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:url("bg.jpg") no-repeat center center;
  background-size:cover;

  z-index:1;

  pointer-events:auto;
}

#playerMap
.monster,
#mobileControls{
  pointer-events:auto;
}

#playerMap{
  position:absolute;
  width:160px;

  top:300px;
  left:100px;

  transition:0.1s;
  
  filter: drop-shadow(0 0 10px black); /* เพิ่มเงา */
}
#playerMap{
  position:absolute;
  width:180px;

  filter: drop-shadow(0 0 10px cyan); /* 🔥 เรืองฟ้า */

  top:300px;
  left:100px;

  transition:0.1s;
}

#playerMap:hover{
  transform: scale(1.1);
}
#monsterMap{
  position:absolute;
  width:140px;
  
  z-index: 50;

  top:200px;
  left:400px;
}
.monster{
  position:absolute;

  width:80px;

  filter: drop-shadow(0 0 15px red);

  transition:0.2s;
}

#coins img{
  margin-right:5px;
}

@keyframes coinPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.6); }
  100% { transform: scale(1); }
}

.coin-animate img{
  animation: coinPop 0.3s ease;
}

#mobileControls{
  position:fixed;

  bottom:15px;
  left:50%;

  transform:translateX(-50%);

  display:none;

  flex-direction:row;
  gap:15px;

  z-index:9999;

  touch-action:none;
  user-select:none;
}

#mobileControls button{

  width:70px;
  height:70px;

  margin:0;

  border:none;

  border-radius:50%;

  font-size:30px;
  font-weight:bold;

  background:linear-gradient(
    180deg,
    #f6d365,
    #fda085
  );

  color:white;

  box-shadow:
    0 0 10px rgba(255,200,0,.8),
    0 0 20px rgba(255,150,0,.5);

  transition:0.15s;
}

#mobileControls button:active{
  transform:scale(0.9);
}

button{
  touch-action: manipulation;
}

body {
  overflow: hidden;
}

.coin{
  animation: floatCoin 1s infinite alternate;
}

@keyframes floatCoin{
  from{ transform: translateY(0px); }
  to{ transform: translateY(-10px); }
}

/* 📱 แสดงปุ่มมือถือ */
@media(max-width:768px){

  #mobileControls{
  display:none;

  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);

  z-index:9999;
}

}

.stageBtn{
  position:absolute;

  width:80px;
  height:80px;

  background:transparent !important;
  border:none;

  margin:0;

}

#mapScreen button{
  background:transparent !important;
}

  content:"🔒";

}

<body ontouchstart="">

onclick="startGame(1)">

<script>
let playerX = 100;
let playerY = 300;

let selectedChar = "wizard.png";

function goToCharacter(){

  document.getElementById("startScreen").style.display = "none";

  document.getElementById("videoScreen").style.display = "flex";

  let video = document.getElementById("introVideo");

  video.currentTime = 0;

  video.muted = false;
  video.volume = 1;

  video.play();

}

function goToCharacterScreen(){

  document.getElementById("videoScreen").style.display="none";

  document.getElementById("characterScreen").style.display="block";

}

function selectChar(e, img){   // ⭐ เพิ่ม e เข้ามา
  selectedChar = img;

  let chars = document.querySelectorAll("#characterScreen img");
  chars.forEach(c => c.classList.remove("selected"));

  e.target.classList.add("selected"); // ⭐ เปลี่ยน event → e
  document.getElementById("playerMap").src = img;

  let playerMap = document.getElementById("playerMap");

  if(img === "wizard.png"){
     playerMap.style.width = "180px";
  }
  else if(img === "knight.png"){
    playerMap.style.width = "250px";
  }
  else if(img === "archer.png"){
    playerMap.style.width = "280px";
  }
}

function goToMap(){
  let name = document.getElementById("playerName").value;
  if(name==""){
    alert("กรุณาใส่ชื่อก่อน!");
    return;
  }
  document.getElementById("welcomeText").innerText = 
  "ยินดีต้อนรับ " + name + " 🎉";

  document.getElementById("welcomeBox").style.display = "flex";

  setTimeout(()=>{
  document.getElementById("mapGuide").style.display = "none";
  },7000);  
}

function closeWelcome(){

  document.getElementById("welcomeBox").style.display = "none";

  document.getElementById("characterScreen").style.display = "none";

  document.getElementById("mapScreen").style.display = "flex";
  
  document.getElementById("mobileControls").style.display = "flex";

}

function startAdventure(lv){

  level = lv;

  document.getElementById("mapScreen").style.display = "none";

  document.getElementById("gameBox").style.display = "block";

  document.getElementById("uiBox").style.display = "none";

  document.getElementById("mapArea").style.display = "block";

  updateMapMonster();

}

function startGame(lv){
  
  document.getElementById("mobileControls").style.display = "flex";

   bgm.pause();
   bgm.currentTime = 0;

  if(lv > unlocked){
    alert("🔒 ต้องผ่านด่านก่อน!");
    return;
  }

  level = lv;
  
  // เปลี่ยนฉากต่อสู้ตามด่าน
 let gameBox = document.getElementById("gameBox");

 if(level == 1){
   gameBox.style.background =
     "url('bgd1.png') no-repeat center center";
 }
 else if(level == 2){
   gameBox.style.background =
     "url('bgd2.png') no-repeat center center";
 }
 else if(level == 3){
   gameBox.style.background =
     "url('bgd3.png') no-repeat center center";
 }
 else if(level == 4){
   gameBox.style.background =
     "url('bgd4.png') no-repeat center center";
 }
 else if(level == 5){
   gameBox.style.background =
     "url('bgd5.png') no-repeat center center";
 }

gameBox.style.backgroundSize = "cover";
  
  updateMapMonster(); // ⭐ ใส่ตรงนี้
  
  document.getElementById("mapScreen").style.display="none";
  document.getElementById("gameBox").style.display="block";

  document.getElementById("uiBox").style.display = "none";
  document.getElementById("mapArea").style.display = "block";
  
  if(window.innerWidth <= 768){

function newQ(){
  let a = parseFloat(randDecimal());
  let b = parseFloat(randDecimal());

  let ops;

  if(level==1) ops=["+","-"];
  if(level==2) ops=["+","-"];
  if(level == 3){

  let type = Math.floor(Math.random()*3);

  if(type == 0){
    a = Math.floor(Math.random()*9)+2;
    b = (Math.random()*9).toFixed(1);
  }

  else if(type == 1){
    a = (Math.random()*9).toFixed(1);
    b = (Math.random()*9).toFixed(1);
  }

  else{
    a = (Math.random()*9).toFixed(1);
    b = (Math.random()*9).toFixed(2);
  }

  correctAnswer =
    (parseFloat(a)*parseFloat(b)).toFixed(3);

  questionText.innerText =
    `${a} × ${b} = ?`;

  generateChoices();
  return;
}
  if(level == 4){

  let divisor =
    Math.floor(Math.random()*8)+2;

  let answer =
    (Math.random()*9+1).toFixed(1);

  let dividend =
    (divisor * parseFloat(answer)).toFixed(1);

  correctAnswer =
    parseFloat(answer).toFixed(3);

  questionText.innerText =
    `${dividend} ÷ ${divisor} = ?`;

  generateChoices();
  return;
}
  if(level == 5){

  let type = Math.floor(Math.random()*6);

  let q = "";

  // แบบ 1
  if(type == 0){

  let a,b,c;

  do{

    a = +(Math.random()*9+1).toFixed(1);
    b = +(Math.random()*9+1).toFixed(1);
    c = +(Math.random()*5+1).toFixed(1);

  }while((a+b)-c < 0);

  correctAnswer = ((a+b)-c).toFixed(3);

  q = `(${a} + ${b}) - ${c}`;
}

  // แบบ 2
  else if(type == 1){

  let b = +(Math.random()*4+1).toFixed(1);
  let c = +(Math.random()*4+1).toFixed(1);

  let a = +(b + c + Math.random()*5 + 1).toFixed(1);

  correctAnswer = (a-(b+c)).toFixed(3);

  q = `${a} - (${b} + ${c})`;
}

  // แบบ 3
  else if(type == 2){

    let a = Math.floor(Math.random()*8)+2;
    let b = +(Math.random()*5+1).toFixed(1);
    let c = +(Math.random()*3+1).toFixed(1);

    correctAnswer = ((a*b)+c).toFixed(3);

    q = `(${a} × ${b}) + ${c}`;
  }

  // แบบ 4
  else if(type == 3){

    let divisor = Math.floor(Math.random()*8)+2;
    let answer = +(Math.random()*5+1).toFixed(1);

    let dividend = +(divisor*answer).toFixed(1);

    let c = +(Math.random()*3+1).toFixed(1);

    correctAnswer = (answer+c).toFixed(3);

    q = `(${dividend} ÷ ${divisor}) + ${c}`;
  }

  // แบบ 5
  else if(type == 4){

    let a = Math.floor(Math.random()*8)+2;
    let b = +(Math.random()*4+1).toFixed(1);
    let c = +(Math.random()*4+1).toFixed(1);

    correctAnswer = (a*(b+c)).toFixed(3);

    q = `${a} × (${b} + ${c})`;
  }

  // แบบ 6
  else{

    let inside = Math.floor(Math.random()*4)+2;

    let answer = +(Math.random()*5+1).toFixed(1);

    let dividend = +(inside*answer).toFixed(1);

    correctAnswer = answer.toFixed(3);

    q = `${dividend} ÷ (${inside-1} + 1)`;
  }

  questionText.innerText = q;

  generateChoices();

  return;
}

  let op = ops[Math.floor(Math.random()*ops.length)];
  if(op == "/" && b == 0){
  b = 1;
}
  
  if(op == "-" && a < b){
    let temp = a;
    a = b;
    b = temp;
}

  switch(op){
    case "+": correctAnswer = (+a + +b).toFixed(3); break;
    case "-": correctAnswer = (+a - +b).toFixed(3); break;
    case "*": correctAnswer = (+a * +b).toFixed(3); break;
    case "/": correctAnswer = (+a / b).toFixed(3); break;
  }

  questionText.innerText = `${a} ${op} ${b} = ?`;

  generateChoices();
}

function generateChoices(){
  let arr=[correctAnswer];

  while(arr.length<4){
    let fake=(parseFloat(correctAnswer)+(Math.random()*2-1)).toFixed(3);
    if(!arr.includes(fake)) arr.push(fake);
  }

  arr.sort(()=>Math.random()-0.5);

  let html="";
  arr.forEach(c=>{
    html += `<button class="choice" onclick="check('${c}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML=html;
}

function move(dir){

  console.log(playerX, playerY);
  
  if(dir === "right"){
    playerX += 20;
  }

  if(dir === "left"){
    playerX -= 20;
  }

  if(dir === "up"){
    playerY -= 20;
  }

  if(dir === "down"){
    playerY += 20;
  }

  let player = document.getElementById("playerMap");

  let mapArea = document.getElementById("mapArea");

playerX = Math.max(
  0,
  Math.min(playerX, mapArea.clientWidth - player.offsetWidth)
);

playerY = Math.max(
  0,
  Math.min(playerY, mapArea.clientHeight - player.offsetHeight)
);

  player.style.left = playerX + "px";
  player.style.top = playerY + "px";

  // ✅ ตรวจชนมอนสเตอร์
  let monsters = document.querySelectorAll(".monster");

  monsters.forEach(monster => {

    let pRect = player.getBoundingClientRect();
    let mRect = monster.getBoundingClientRect();

    if(
      pRect.left < mRect.right &&
      pRect.right > mRect.left &&
      pRect.top < mRect.bottom &&
      pRect.bottom > mRect.top
    ){
      enterBattle();

      monster.style.display = "none";
    }

  });

}
